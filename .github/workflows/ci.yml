name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  server:
    name: API (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      # Prisma Client is needed for the typecheck. generate does not connect to
      # the DB, but the datasource env var must be present.
      - run: npx prisma generate
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/ci
      - run: npm run lint
      - run: npm run build
